<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de Recherche · Azen Cordaven · Maison Felora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0d0a;
  --black-2:#0f140f;
  --green-deep:#0e1f17;
  --green:#163a29;
  --green-bright:#2f7a55;
  --green-soft:#4fae7e;
  --gold:#c9a24b;
  --gold-light:#ecd595;
  --gold-dim:#8f7333;
  --parchment:#e7e2cd;
  --parchment-soft:#b7bba6;
  --ink-line:rgba(201,162,75,.22);
  --shadow:rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at 50% -10%, #13261c 0%, var(--black) 60%, #050705 100%);
  color:var(--parchment);
  font-family:'EB Garamond',Georgia,serif;font-size:18px;line-height:1.7;
  min-height:100vh;overflow-x:hidden;
}

/* poussière dorée */
.dust{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.mote{position:absolute;border-radius:50%;background:var(--gold-light);opacity:0;animation:drift linear infinite}
@keyframes drift{0%{opacity:0;transform:translateY(20px)}10%{opacity:.45}90%{opacity:.35}100%{opacity:0;transform:translateY(-110vh) translateX(40px)}}

/* cercle runique de fond */
.rune-bg{position:fixed;top:50%;left:50%;width:760px;height:760px;transform:translate(-50%,-50%);
  z-index:0;opacity:.06;pointer-events:none;animation:spin 120s linear infinite}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* voile d'entrée */
#veil{position:fixed;inset:0;z-index:90;background:radial-gradient(circle at 50% 40%,#102018 0%,#050705 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  cursor:pointer;transition:opacity 1s ease,visibility 1s;padding:2rem}
#veil.lifted{opacity:0;visibility:hidden}
.veil-seal{width:120px;height:120px;margin-bottom:2rem;animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
.veil-title{font-family:'Cinzel',serif;font-size:clamp(1.6rem,5vw,2.7rem);letter-spacing:.16em;color:var(--gold-light);font-weight:600}
.veil-sub{font-style:italic;color:var(--green-soft);margin-top:1rem;font-size:1.05rem}
.veil-cta{margin-top:2.5rem;font-family:'Cinzel',serif;font-size:.76rem;letter-spacing:.34em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold-dim);padding:.85rem 1.8rem;border-radius:2px;transition:.4s}
#veil:hover .veil-cta{background:var(--gold);color:var(--black);box-shadow:0 0 30px rgba(201,162,75,.4)}

/* barre supérieure */
.topbar{position:relative;z-index:6;display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:1.1rem clamp(1rem,4vw,2.4rem);border-bottom:1px solid var(--ink-line);
  background:linear-gradient(180deg,rgba(14,31,23,.6),transparent)}
.brand{display:flex;align-items:center;gap:.9rem;min-width:0}
.brand svg{width:34px;height:34px;flex-shrink:0}
.brand-text h1{font-family:'Cinzel',serif;font-size:clamp(.95rem,2.6vw,1.25rem);letter-spacing:.1em;
  color:var(--gold-light);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-text p{font-style:italic;font-size:.82rem;color:var(--green-soft);margin-top:.1rem}
.topbar-actions{display:flex;gap:.6rem;flex-shrink:0}
.btn{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold-light);background:rgba(47,122,85,.12);border:1px solid var(--gold-dim);
  padding:.6rem .9rem;border-radius:3px;cursor:pointer;transition:.3s;white-space:nowrap}
.btn:hover{background:var(--green);border-color:var(--gold)}
.btn.active{background:var(--gold);color:var(--black);border-color:var(--gold)}
.btn.ghost{background:none;color:var(--parchment-soft)}
.btn.ghost:hover{color:var(--gold-light)}

/* mise en page */
.layout{position:relative;z-index:5;display:grid;grid-template-columns:268px 1fr;
  gap:0;max-width:1180px;margin:0 auto;min-height:calc(100vh - 70px)}

/* sommaire */
.sommaire{border-right:1px solid var(--ink-line);padding:2rem 1.2rem;position:sticky;top:0;
  align-self:start;max-height:100vh;overflow-y:auto}
.sommaire-h{font-family:'Cinzel',serif;font-size:.74rem;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gold);display:flex;align-items:center;gap:.7rem;margin-bottom:1.4rem}
.sommaire-h .line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}
.tab-list{list-style:none;display:flex;flex-direction:column;gap:.35rem}
.tab-item{display:flex;align-items:center;gap:.6rem;padding:.7rem .8rem;border-radius:4px;cursor:pointer;
  border:1px solid transparent;transition:.25s;color:var(--parchment-soft)}
.tab-item:hover{background:rgba(47,122,85,.12);color:var(--parchment)}
.tab-item.active{background:linear-gradient(90deg,rgba(47,122,85,.22),transparent);
  border-color:var(--ink-line);color:var(--gold-light)}
.tab-item .rom{font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold-dim);width:1.8rem;flex-shrink:0}
.tab-item.active .rom{color:var(--gold)}
.tab-item .label{font-family:'Cinzel',serif;font-size:.86rem;letter-spacing:.04em;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-item .del{display:none;background:none;border:none;color:var(--gold-dim);cursor:pointer;
  font-size:1.1rem;line-height:1;padding:0 .2rem;transition:.2s}
.tab-item .del:hover{color:#d97b6b}
body.editing .tab-item .del{display:block}
.add-tab{display:none;margin-top:1rem;width:100%;justify-content:center}
body.editing .add-tab{display:block}

/* page de contenu */
.content{padding:clamp(1.6rem,4vw,3rem) clamp(1.4rem,4vw,3.2rem)}
.toolbar{display:none;gap:.4rem;flex-wrap:wrap;margin-bottom:1.6rem;padding-bottom:1.2rem;
  border-bottom:1px dashed var(--ink-line)}
body.editing .toolbar{display:flex}
.tool{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  background:none;border:1px solid var(--gold-dim);color:var(--gold-light);padding:.45rem .7rem;
  border-radius:3px;cursor:pointer;transition:.25s}
.tool:hover{background:var(--green);border-color:var(--gold)}
.edit-hint{font-style:italic;font-size:.82rem;color:var(--green-soft);align-self:center;margin-left:auto}

.page-eyebrow{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--green-soft);margin-bottom:.7rem}
.page-title{font-family:'Cinzel',serif;font-weight:700;color:var(--gold-light);
  font-size:clamp(1.7rem,5vw,2.6rem);line-height:1.15;margin-bottom:.4rem;outline:none}
.title-rule{width:70px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:1rem 0 2rem}
.page-body{outline:none;font-size:1.08rem}
.page-body p{margin-bottom:1.15rem;text-align:justify;hyphens:auto}
.page-body h3{font-family:'EB Garamond',serif;font-style:italic;color:var(--green-soft);
  font-size:1.35rem;margin:1.8rem 0 .8rem;font-weight:600}
.page-body em{color:var(--gold-light);font-style:italic}
.page-body strong{color:var(--gold-light);font-weight:600}
.page-body .lead{font-size:1.15rem;font-style:italic;color:var(--parchment-soft)}
.page-body .margin-note{font-family:'Caveat',cursive;color:var(--green-soft);font-size:1.5rem;line-height:1.25;
  border-left:2px solid var(--gold-dim);padding:.2rem 0 .2rem 1rem;margin:1.6rem 0;transform:rotate(-.5deg)}
.page-body .margin-note::before{content:"❧ ";color:var(--gold-dim)}
.page-body ul{margin:0 0 1.15rem 1.4rem}
.page-body ol{margin:0 0 1.15rem 1.4rem}
.page-body #pantinStage{position:relative;width:100%;max-width:340px;margin:1.1rem auto;aspect-ratio:300/360;
  border:1px solid var(--ink-line);border-radius:6px;cursor:grab;touch-action:none;
  background:radial-gradient(ellipse at 50% 22%,rgba(47,122,85,.1),rgba(20,30,22,.25) 72%)}
.page-body #pantinStage:active{cursor:grabbing}
.page-body #pantinStage svg{width:100%;height:100%;display:block}
.page-body .kitsune-art{max-width:380px;margin:1.2rem auto;display:block;
  filter:drop-shadow(0 0 16px rgba(79,174,126,.2))}
.page-body .kitsune-art svg{width:100%;height:auto;display:block}
.page-body li{margin-bottom:.4rem}
.page-title[contenteditable="true"],.page-body[contenteditable="true"]{
  border-radius:4px;transition:.3s}
.page-body[contenteditable="true"]{padding:1rem;background:rgba(47,122,85,.06);
  box-shadow:inset 0 0 0 1px var(--ink-line)}
.page-title[contenteditable="true"]:focus,.page-body[contenteditable="true"]:focus{
  box-shadow:inset 0 0 0 1px var(--gold-dim)}

/* planches / croquis */
.page-body .plate{margin:2.4rem 0;border:1px solid var(--ink-line);border-radius:5px;
  padding:1.8rem 1.6rem 1.2rem;position:relative;
  background:radial-gradient(ellipse at 50% 35%,rgba(47,122,85,.07),transparent 72%)}
.page-body .plate::before,.page-body .plate::after{content:"";position:absolute;width:14px;height:14px;
  border-color:var(--gold-dim);border-style:solid}
.page-body .plate::before{top:7px;left:7px;border-width:1px 0 0 1px}
.page-body .plate::after{bottom:7px;right:7px;border-width:0 1px 1px 0}
.page-body .plate svg{display:block;width:100%;height:auto;max-width:340px;margin:.4rem auto 0;overflow:visible}
.page-body .plate-no{position:absolute;top:.95rem;left:1.2rem;font-family:'Cinzel',serif;
  font-size:.64rem;letter-spacing:.24em;color:var(--gold-dim)}
.page-body .plate-cap{text-align:center;margin-top:1.1rem;font-size:.92rem;color:var(--parchment-soft);font-style:italic}
.page-body .plate-cap b{display:block;font-style:normal;font-family:'Cinzel',serif;font-size:.76rem;
  letter-spacing:.12em;color:var(--gold-light);margin-bottom:.25rem}
.page-body .plate-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin:2.4rem 0}
.page-body .plate-grid .plate{margin:0}
@media (max-width:620px){.page-body .plate-grid{grid-template-columns:1fr}}

/* schéma général */
.page-body .schema-frame{position:relative;margin:2.2rem 0;border:1px solid var(--ink-line);
  border-radius:6px;padding:.7rem;background:#efe9da;cursor:zoom-in;overflow:hidden}
.page-body .schema-frame img{display:block;width:100%;height:auto;border-radius:3px}
.page-body .schema-frame .schema-zoom{position:absolute;right:.8rem;bottom:.8rem;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold-light);background:rgba(10,13,10,.72);border:1px solid var(--gold-dim);
  padding:.4rem .7rem;border-radius:3px;pointer-events:none}
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(5,7,5,.92);display:none;
  align-items:center;justify-content:center;padding:2rem;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:96%;max-height:92%;border:1px solid var(--gold-dim);border-radius:4px;
  box-shadow:0 30px 80px rgba(0,0,0,.6)}
.lightbox .lb-close{position:absolute;top:1.2rem;right:1.6rem;font-family:'Cinzel',serif;
  font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-light);
  border:1px solid var(--gold-dim);padding:.55rem .9rem;border-radius:3px;background:none}

/* runes d'éveil */
.page-body .group-label{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.24em;
  text-transform:uppercase;color:var(--gold);margin:2.2rem 0 .4rem;display:flex;align-items:center;gap:.8rem}
.page-body .group-label .line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent)}
.page-body .rune-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1rem;margin:1rem 0 1.4rem}
.page-body .rune-card{border:1px solid var(--ink-line);border-radius:5px;padding:1.1rem .9rem;text-align:center;
  background:radial-gradient(ellipse at 50% 22%,rgba(47,122,85,.08),transparent 76%)}
.page-body .rune-card svg{width:36px;height:54px;display:block;margin:0 auto .6rem}
.page-body .rune-card .rn{font-family:'Cinzel',serif;font-size:.84rem;letter-spacing:.05em;color:var(--gold-light)}
.page-body .rune-card .fu{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--green-soft);margin:.18rem 0 .55rem}
.page-body .rune-card p{font-size:.85rem;line-height:1.45;text-align:center;margin:0;color:var(--parchment-soft)}
.page-body .rune-card .where{display:block;font-style:italic;color:var(--gold-dim);font-size:.76rem;margin-top:.55rem}
.page-body .rune-card.peril{border-color:rgba(194,103,74,.45)}
.page-body .rune-card.peril .rn{color:#e0a088}
.page-body .bindrune{display:flex;flex-direction:column;align-items:center;gap:1rem;border:1px solid var(--ink-line);
  border-radius:6px;padding:2rem 1.4rem 1.6rem;margin:2rem 0;position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 32%,rgba(47,122,85,.1),transparent 70%)}
.page-body .bindrune svg{width:210px;height:210px;position:relative;z-index:2}
.page-body .bindrune .bind-cap{text-align:center;font-style:italic;color:var(--parchment-soft);font-size:.92rem;max-width:30rem;position:relative;z-index:2}
.page-body .bindrune .bind-cap b{display:block;font-style:normal;font-family:'Cinzel',serif;font-size:.8rem;
  letter-spacing:.14em;color:var(--gold-light);margin-bottom:.3rem}
/* animations du sceau */
.page-body .bindrune svg .seal-core{animation:sealPulse 3.2s ease-in-out infinite}
@keyframes sealPulse{0%,100%{filter:drop-shadow(0 0 2px rgba(240,180,80,.35))}50%{filter:drop-shadow(0 0 9px rgba(245,185,90,.85))}}
/* champ de braises */
.page-body .bindrune .ember-field{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.page-body .bindrune .ember{position:absolute;bottom:16%;border-radius:50%;opacity:0;
  background:radial-gradient(circle,#ffe6a8 0%,#f4a93f 45%,rgba(217,110,40,0) 72%);
  box-shadow:0 0 7px 2px rgba(244,160,60,.55);filter:blur(.3px);
  animation:emberRise linear infinite}
@keyframes emberRise{
  0%{opacity:0;transform:translate(0,0) scale(.6)}
  12%{opacity:.95}
  60%{opacity:.75}
  100%{opacity:0;transform:translate(var(--dx,0),-150px) scale(1.15)}}
@media (prefers-reduced-motion:reduce){.page-body .bindrune .ember-field{display:none}}
.page-body .caution{border:1px solid rgba(194,103,74,.4);background:rgba(194,103,74,.08);
  border-radius:4px;padding:1.1rem 1.3rem;margin:1.8rem 0}
.page-body .caution .ch{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
  color:#dd8a6c;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.page-body .caution p{margin-bottom:.7rem}
.page-body .caution p:last-child{margin-bottom:0}
.page-body .caution b{color:#e0a088;font-weight:600}
.page-body .rune-card{cursor:zoom-in}
body.editing .page-body .rune-card{cursor:text}

/* agrandissement d'une rune */
.rune-modal{position:fixed;inset:0;z-index:85;background:rgba(5,7,5,.92);display:none;
  align-items:center;justify-content:center;padding:2rem;cursor:zoom-out}
.rune-modal.open{display:flex}
.rune-modal-card{background:linear-gradient(180deg,var(--green-deep),var(--black-2));
  border:1px solid var(--gold-dim);border-radius:8px;padding:2.6rem 2.8rem;max-width:430px;
  text-align:center;cursor:default;box-shadow:0 30px 80px rgba(0,0,0,.6);animation:rmPop .35s ease}
@keyframes rmPop{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
.rune-modal .rm-glyph svg{width:118px;height:177px;display:block;margin:0 auto 1.3rem}
.rune-modal .rm-name{font-family:'Cinzel',serif;font-size:1.45rem;letter-spacing:.05em;color:var(--gold-light)}
.rune-modal .rm-fu{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--green-soft);margin:.35rem 0 1.2rem}
.rune-modal .rm-eff{font-size:1.06rem;color:var(--parchment);line-height:1.65;margin:0}
.rune-modal .rm-where{font-style:italic;color:var(--gold-dim);font-size:.92rem;margin-top:1.1rem}

/* fiche de sort */
.page-body .spell{display:flex;gap:1.6rem;align-items:flex-start;margin:1.2rem 0 1.6rem;flex-wrap:wrap}
.page-body .spell-art{flex:0 0 auto;width:210px;max-width:100%;margin:0 auto}
.page-body .spell-art img{width:100%;height:auto;display:block;cursor:zoom-in;
  filter:drop-shadow(0 0 16px rgba(150,40,100,.4))}
.page-body .spell-sheet{flex:1 1 240px;min-width:230px}
.page-body .spell-name{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold-light);letter-spacing:.04em}
.page-body .spell-pron{font-style:italic;color:var(--green-soft);margin:.1rem 0 .9rem;font-size:.92rem}
.page-body .spell-box{border:1px solid var(--ink-line);border-radius:5px;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,rgba(47,122,85,.08),transparent 70%)}
.page-body .spell-box .srow{display:flex;border-bottom:1px solid var(--ink-line)}
.page-body .spell-box .srow:last-child{border-bottom:none}
.page-body .spell-box dt{flex:0 0 38%;padding:.6rem .8rem;font-family:'Cinzel',serif;font-size:.64rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:rgba(47,122,85,.08)}
.page-body .spell-box dd{flex:1;padding:.6rem .8rem;margin:0;color:var(--parchment);font-size:.95rem}
.page-body .spell-box dd em{color:var(--gold-light);font-style:italic}
@media (max-width:520px){.page-body .spell-art{width:180px}}

/* tableau comparatif des fils */
.page-body .fil-table{width:100%;border-collapse:collapse;margin:1.4rem 0;font-size:.9rem}
.page-body .fil-table th,.page-body .fil-table td{padding:.6rem .7rem;text-align:left;
  border-bottom:1px solid var(--ink-line);vertical-align:top}
.page-body .fil-table th{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--gold);font-weight:500}
.page-body .fil-table td:first-child{color:var(--gold-light);font-style:italic;white-space:nowrap}
.page-body .fil-table tr:last-child td{border-bottom:none}

/* lecteur de musique */
.player{position:fixed;right:1.4rem;bottom:1.4rem;z-index:20;display:flex;flex-direction:column;align-items:flex-end;gap:.7rem}
.seal{width:60px;height:60px;border-radius:50%;cursor:pointer;border:none;
  background:radial-gradient(circle at 35% 30%,var(--green-bright) 0%,var(--green-deep) 75%);
  box-shadow:0 6px 22px var(--shadow),inset 0 0 0 2px var(--gold-dim);
  display:flex;align-items:center;justify-content:center;transition:.4s}
.seal:hover{box-shadow:0 6px 30px rgba(201,162,75,.4),inset 0 0 0 2px var(--gold)}
.seal svg{width:28px;height:28px;fill:var(--gold-light)}
.seal.playing{animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 6px 22px var(--shadow),inset 0 0 0 2px var(--gold-dim)}
  50%{box-shadow:0 6px 34px rgba(79,174,126,.5),inset 0 0 0 2px var(--gold)}}
.panel{background:linear-gradient(180deg,var(--green-deep),var(--black-2));border:1px solid var(--gold-dim);
  border-radius:6px;padding:1rem 1.1rem;width:240px;box-shadow:0 20px 40px -10px var(--shadow);
  transform-origin:bottom right;transition:.35s;opacity:0;transform:scale(.85) translateY(10px);pointer-events:none}
.panel.open{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
.panel-h{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.8rem;text-align:center}
.track{font-style:italic;font-size:.88rem;color:var(--parchment-soft);text-align:center;margin-bottom:.9rem;
  min-height:1.2em;word-break:break-word}
.controls{display:flex;align-items:center;justify-content:center;margin-bottom:.9rem}
.ctrl-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold-light);width:42px;height:42px;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.3s}
.ctrl-btn:hover:not(:disabled){background:var(--green);border-color:var(--gold)}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}
.ctrl-btn svg{width:18px;height:18px;fill:currentColor}
.load-label{display:block;text-align:center;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gold);cursor:pointer;border:1px dashed var(--gold-dim);border-radius:3px;
  padding:.6rem;transition:.3s;margin-bottom:.9rem}
.load-label:hover{background:rgba(201,162,75,.1);border-color:var(--gold)}
.load-label input{display:none}
.vol{display:flex;align-items:center;gap:.6rem}
.vol svg{width:16px;height:16px;fill:var(--gold-dim);flex-shrink:0}
.vol input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:3px;background:var(--gold-dim);outline:none}
.vol input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--gold-light);cursor:pointer}
.vol input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--gold-light);cursor:pointer;border:none}

@media (max-width:820px){
  .layout{grid-template-columns:1fr}
  .sommaire{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--ink-line);
    padding:1.4rem 1rem}
  .tab-list{flex-direction:row;flex-wrap:wrap}
  .tab-item{flex:0 1 auto}
  .tab-item .rom{display:none}
  .rune-bg{display:none}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important}.mote{display:none}}
</style>
</head>
<body>

<div class="dust" id="dust"></div>

<svg class="rune-bg" viewBox="0 0 200 200" aria-hidden="true">
  <circle cx="100" cy="100" r="96" fill="none" stroke="#c9a24b" stroke-width=".5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#4fae7e" stroke-width=".4"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#c9a24b" stroke-width=".4"/>
  <polygon points="100,20 169,140 31,140" fill="none" stroke="#c9a24b" stroke-width=".4"/>
  <polygon points="100,180 31,60 169,60" fill="none" stroke="#4fae7e" stroke-width=".4"/>
  <g stroke="#c9a24b" stroke-width=".4">
    <line x1="100" y1="4" x2="100" y2="22"/><line x1="100" y1="178" x2="100" y2="196"/>
    <line x1="4" y1="100" x2="22" y2="100"/><line x1="178" y1="100" x2="196" y2="100"/>
  </g>
</svg>

<!-- voile -->
<div id="veil" role="button" tabindex="0" aria-label="Ouvrir le carnet">
  <svg class="veil-seal" viewBox="0 0 100 100" aria-hidden="true">
    <defs><clipPath id="clipVeil"><circle cx="50" cy="50" r="40"/></clipPath></defs>
    <circle cx="50" cy="50" r="46" fill="none" stroke="var(--gold-dim)" stroke-width="1.6"/>
    <image id="logoVeil" x="10" y="10" width="80" height="80" clip-path="url(#clipVeil)" preserveAspectRatio="xMidYMid slice"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="var(--gold-light)" stroke-width="1.4" opacity=".75"/>
  </svg>
  <div class="veil-title">Carnet du Marionnettiste</div>
  <div class="veil-sub">Recherches d'Azen Cordaven · Maison Felora</div>
  <div class="veil-cta">Ouvrir le carnet</div>
</div>

<!-- barre supérieure -->
<header class="topbar">
  <div class="brand">
    <svg viewBox="0 0 100 100" aria-hidden="true">
      <defs><clipPath id="clipBrand"><circle cx="50" cy="50" r="41"/></clipPath></defs>
      <circle cx="50" cy="50" r="46" fill="none" stroke="var(--gold-dim)" stroke-width="2.4"/>
      <image id="logoBrand" x="9" y="9" width="82" height="82" clip-path="url(#clipBrand)" preserveAspectRatio="xMidYMid slice"/>
      <circle cx="50" cy="50" r="41" fill="none" stroke="var(--gold-light)" stroke-width="1.6" opacity=".7"/>
    </svg>
    <div class="brand-text">
      <h1>Carnet d'Azen Cordaven</h1>
      <p>Maison Felora · Académie Wendelhart</p>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="btn" id="editToggle">Éditer</button>
    <button class="btn ghost" id="resetBtn" title="Restaurer les onglets d'origine" style="display:none">Réinitialiser</button>
  </div>
</header>

<!-- mise en page -->
<div class="layout">
  <aside class="sommaire">
    <div class="sommaire-h">Sommaire <span class="line"></span></div>
    <ul class="tab-list" id="tabList"></ul>
    <button class="btn add-tab" id="addTab">+ Ajouter un onglet</button>
  </aside>

  <main class="content">
    <div class="toolbar" id="toolbar">
      <button class="tool" data-cmd="bold">Gras</button>
      <button class="tool" data-cmd="italic">Italique</button>
      <button class="tool" data-cmd="h3">Sous-titre</button>
      <button class="tool" data-cmd="note">Note manuscrite</button>
      <button class="tool" data-cmd="list">Liste</button>
      <span class="edit-hint">Tes textes se sauvegardent automatiquement.</span>
    </div>
    <div class="page-eyebrow" id="pageEyebrow">Azen Cordaven</div>
    <h1 class="page-title" id="pageTitle"></h1>
    <div class="title-rule"></div>
    <div class="page-body" id="pageBody"></div>
  </main>
</div>

<!-- lecteur de musique -->
<div class="player">
  <div class="panel" id="panel" role="dialog" aria-label="Musique d'ambiance">
    <div class="panel-h">Musique d'ambiance</div>
    <div class="track" id="track">St Trina</div>
    <div class="controls">
      <button class="ctrl-btn" id="play" aria-label="Lecture / Pause">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
    </div>
    <label class="load-label">Charger une mélodie<input type="file" id="file" accept="audio/*"></label>
    <div class="vol">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.5" aria-label="Volume">
    </div>
  </div>
  <button class="seal" id="seal" aria-label="Ouvrir le lecteur de musique">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
  </button>
</div>

<!-- agrandissement du schéma -->
<div class="lightbox" id="lightbox" role="dialog" aria-label="Schéma agrandi">
  <button class="lb-close" id="lbClose">Fermer ✕</button>
  <img id="lbImg" alt="Schéma agrandi">
</div>

<!-- agrandissement d'une rune -->
<div class="rune-modal" id="runeModal" role="dialog" aria-label="Rune agrandie">
  <button class="lb-close" id="rmClose">Fermer ✕</button>
  <div class="rune-modal-card">
    <div class="rm-glyph" id="rmGlyph"></div>
    <div class="rm-name" id="rmName"></div>
    <div class="rm-fu" id="rmFu"></div>
    <p class="rm-eff" id="rmEff"></p>
    <div class="rm-where" id="rmWhere"></div>
  </div>
</div>

const NEURO_BLOCK=`
<div class="group-label">Le sort des marionnettistes <span class="line"></span></div>
<div id="neurospastum" class="spell">
  <div class="spell-art"><img id="neuroImg" alt="Neurospastum : le sujet suspendu par des fils invisibles"></div>
  <div class="spell-sheet">
    <div class="spell-name">Neurospastum</div>
    <div class="spell-pron">« neu-ro-SPAS-tum »</div>
    <dl class="spell-box">
      <div class="srow"><dt>Incantation</dt><dd><em>Neurospastum</em></dd></div>
      <div class="srow"><dt>Type</dt><dd>Charme</dd></div>
      <div class="srow"><dt>Mouvement</dt><dd>un relevé souple, comme on tend un fil</dd></div>
      <div class="srow"><dt>Lumière</dt><dd>fils pourpres</dd></div>
      <div class="srow"><dt>Effet</dt><dd>Corps déplacé ; le sujet mû comme une marionnette</dd></div>
    </dl>
  </div>
</div>
<p>Le <em>Neurospastum</em> soulève un corps à quelques pouces du sol et le meut à distance, comme si des fils invisibles le tenaient. Conscient ou non, le sujet devient une figure entre les mains du lanceur : on lève la main, un bras se tend ; on tourne le poignet, la tête suit. Là où les sortilèges de lévitation portent un objet, celui-ci porte une <em>volonté</em>.</p>
<p>C'est le rêve secret de tout marionnettiste : se passer du bois et des fils, et faire d'un être vivant sa figure. Je le consigne avec autant de fascination que de réserve, car ce que ce charme accomplit d'un geste, j'y emploie, moi, des mois de gravure.</p>
<p class="margin-note">un sort fait en un mot ce que je cherche à graver en cent runes. humilité.</p>`;
const SCHEMA_DESC=`
<div id="schema-desc">
<div class="group-label">Légende de la planche <span class="line"></span></div>
<p>Ce que montre la planche, quartier par quartier :</p>

<h3>Vue d'ensemble</h3>
<p>Une silhouette humaine élancée d'environ <em>170 cm</em>, pensée pour la grâce et la légèreté d'une danseuse. Mouvements fluides et précis, commandés par des fils ou par un flux magique.</p>

<h3>Structure interne</h3>
<ul>
<li><strong>Colonne centrale</strong> : l'axe qui relie la tête, le torse et le bassin.</li>
<li><strong>Articulations sphériques</strong> : elles offrent une grande amplitude et de la fluidité.</li>
<li><strong>Réservoir de flux magique</strong> : logé au centre du torse, il alimente les mouvements.</li>
<li><strong>Ancrages des fils</strong> : points d'attache discrets, répartis pour un équilibre parfait.</li>
</ul>

<h3>Connexion des fils</h3>
<ul>
<li><strong>Contrôleur principal</strong> : la commande centrale, la barre de croix.</li>
<li><strong>Fils principaux</strong> : soutien et grands mouvements du corps.</li>
<li><strong>Fils secondaires</strong> : mouvements fins des doigts et de la tête.</li>
<li>Ancrages intégrés au corps, pour une esthétique épurée.</li>
</ul>

<h3>Matériaux</h3>
<ul>
<li><strong>Bois fin</strong> : léger et résistant, pour la structure principale.</li>
<li><strong>Métal doré</strong> : articulations et mécanismes de haute précision.</li>
<li><strong>Céramique lisse</strong> : surfaces douces et nobles.</li>
<li><strong>Tissu léger</strong> : voiles et drapés, pour une élégance aérienne.</li>
</ul>

<h3>Articulations principales</h3>
<p>Les points qui plient et tournent : <em>tête</em> (rotation 360°), <em>épaules</em>, <em>coudes</em>, <em>poignets</em>, <em>torse</em> (inclinaison et rotation), <em>hanches</em>, <em>genoux</em> et <em>chevilles</em>.</p>

<h3>Mains et doigts</h3>
<p>Des doigts fins à articulations multiples pour des gestes délicats et expressifs, et une paume sculptée pour une prise de fils subtile.</p>

<h3>Expressions / Tête</h3>
<p>Un visage lisse et sans traits : l'expression naît de la <em>posture</em> et du <em>mouvement</em>, jamais du visage. Les ornements sont discrets, fondus dans la structure.</p>

<h3>Types de marionnettes</h3>
<ul>
<li><strong>Standard</strong> : usage général.</li>
<li><strong>Danseuse</strong> : agilité maximale.</li>
<li><strong>Garde</strong> : stabilité accrue.</li>
<li><strong>Artiste</strong> : mouvements fins.</li>
<li><strong>Élégante</strong> : présence scénique.</li>
</ul>

<h3>Modes de contrôle</h3>
<ul>
<li><strong>Par fils</strong> : la méthode traditionnelle, d'une grande précision.</li>
<li><strong>Par flux magique</strong> : les fils sont remplacés par un flux interne, c'est la figure autonome (voir l'onglet <em>Runes d'éveil</em>).</li>
<li><strong>Mixte</strong> : les deux combinés, pour une maîtrise optimale.</li>
</ul>

<h3>Entretien</h3>
<p>Vérifier et huiler légèrement les articulations, dépoussiérer et inspecter l'usure des fils, recharger le réservoir en flux purifié, nettoyer les surfaces au chiffon doux et sec, recoudre ou remplacer les tissus abîmés.</p>

<p class="margin-note">tout est là, sur une seule feuille. ce que j'ajoute dans ce carnet n'en est que la marge.</p>
</div>`;

  {id:'preambule',title:'Préambule',body:`<p>Les royaumes naissent, prospèrent et disparaissent au gré des siècles. Même les plus grands exploits finissent par s'effacer, et les noms des héros sombrent peu à peu dans l'oubli. Pourtant, certaines œuvres échappent au temps. Elles traversent les générations, portent la mémoire de leur créateur et continuent de susciter l'admiration bien après sa disparition.</p>
<p class="lead">C'est cette forme d'immortalité que je poursuis.</p>
<p>Je me nomme Azen, et mon ambition n'est pas de devenir le plus puissant des hommes, mais le plus grand des artistes. Je souhaite laisser derrière moi des créations qui défieront les années, des œuvres capables d'émerveiller autant que d'inspirer, jusqu'à ce que mon propre nom ne soit plus qu'un murmure.</p>
<p>Les marionnettes ne sont pas de simples assemblages de bois, de métal ou d'enchantements. Elles sont l'expression d'une idée, la rencontre entre la précision d'un artisan, l'ingéniosité d'un érudit et la sensibilité d'un artiste. Lorsqu'elles prennent vie, elles racontent une histoire sans prononcer le moindre mot.</p>
<p>J'ai la chance d'évoluer au sein d'un royaume guidé par la sagesse de Sa Majesté Hazelyonn Wendelhart, dont la volonté de favoriser le savoir et l'excellence permet à des recherches telles que celle-ci d'exister. Si mes travaux devaient un jour servir le royaume, protéger ses habitants ou simplement enrichir son patrimoine, alors ils auraient déjà trouvé leur raison d'être.</p>
<p>Ce traité rassemble les fondements de mes recherches, mes observations et les principes qui guideront mon œuvre. Chaque page est une étape de plus vers un idéal qui semble encore hors de portée, mais auquel je refuse de renoncer.</p>
<p>Car un artiste ne mesure pas sa grandeur à la reconnaissance de son époque, mais à la capacité de ses œuvres à lui survivre.</p>
<p class="margin-note">Et c'est cette éternité que je compte atteindre.</p>`},
  {id:'recherches',title:'Recherches',body:`<p>Note de travail libre. Consigne ici tes observations, tes croquis décrits, tes hypothèses.</p>
<h3>Hypothèse en cours</h3>
<p>Une figure de taille humaine ne devient présence qu'à partir du moment où l'on relie son <em>front</em> et non ses seuls membres. Reste à le prouver.</p>
<p class="margin-note">à vérifier au prochain essai.</p>${COURS_BLOCK}`},
  {id:'sortileges',title:'Sortilèges',body:`${NEURO_BLOCK}
<p class="lead">L'animation par le fil est un art de degrés. On ne pose pas un fil de présence comme on pose un fil de geste : entre les deux, des années.</p>
<p>Un <em>fil</em> n'est pas toujours une corde. C'est un lien d'intention tendu entre la main du meneur et le réceptacle de la figure. Il peut être de crin trempé dans l'encre des veilleuses, de flux magique pur sans aucun support, ou gravé à même le bois (voir l'onglet <em>Runes d'éveil</em>). Sa nature change ; sa loi, jamais : <em>tirer transmet, lâcher rend</em>.</p>

<div class="group-label">Les trois fils <span class="line"></span></div>

<h3>I. Le fil de geste</h3>
<p><strong>Difficulté ●○○ : première année.</strong> Le plus humble, et le seul qu'une apprentie pose sans risque dès le premier jour.</p>
<p>Il commande un <em>mouvement unique et précis</em>, et rien d'autre : lever un bras, tourner la tête, fléchir un genou, refermer une main. Un fil par geste, un geste par fil. Il se noue au point d'ancrage le plus proche du membre : l'épaule pour le bras, le poignet pour la main, le genou pour la jambe.</p>
<p><strong>Combien.</strong> Autant qu'on a de doigts, pas un de plus. Au-delà de dix attaches, la main du meneur s'embrouille, et c'est la figure qui commence à mener.</p>
<p><strong>Tenue.</strong> Tant qu'on tire, le geste tient ; on relâche, le membre retombe. Aucune mémoire, aucune initiative. C'est sa franchise et sa limite.</p>
<p><strong>Ratés.</strong> Un fil trop court bride le mouvement et la main désigne toujours le sol. Deux fils de geste sur un même membre se disputent : la figure tremble. Un fil croisé avec son voisin provoque un à-coup sec : le membre tressaute comme piqué.</p>
<p class="margin-note">le fil de geste ne ment jamais. c'est pour ça qu'on l'aime, et qu'on s'en lasse.</p>

<h3>II. Le fil d'attitude</h3>
<p><strong>Difficulté ●●○ : deuxième ou troisième année.</strong> C'est ici que la plupart échouent.</p>
<p>Il ne dicte pas un geste mais une <em>posture intérieure</em> : la vigilance, la déférence, la lassitude, le défi. La figure improvise alors d'elle-même les mouvements qui conviennent à son humeur. On ne tire plus un membre : on tend une intention.</p>
<p><strong>Pose.</strong> Il ne se noue pas à un membre mais au tronc, près du réceptacle. Tout tient dans le mot qu'on emploie : nommer l'attitude avec exactitude. Un mot vague donne une figure capricieuse.</p>
<p><strong>Le débordement.</strong> Une attitude mal bornée ne sait pas s'arrêter. La déférence que j'ai nouée à mon onzième essai a incliné la tête de la figure jusqu'à lui faire toucher sa propre poitrine. Toujours border une attitude d'un <em>fil de retenue</em>, sans quoi elle court jusqu'à l'absurde.</p>
<p><strong>Combien.</strong> Un seul à la fois ; deux pour les mains très sûres. Mais jamais deux attitudes contraires : déférence et défi se repoussent, et la figure se fige, déchirée entre elles.</p>
<p><strong>Tenue.</strong> Il persiste même quand on ne tire pas : c'est sa force et son piège. Pour le défaire, il faut le <em>dénouer</em>, pas seulement le lâcher.</p>
<p class="margin-note">l'attitude, c'est donner une humeur à du bois. on croit gouverner ; on négocie déjà.</p>

<h3>III. Le fil de présence</h3>
<p><strong>Difficulté ●●● : maîtrise.</strong> Je n'en ai noué qu'un seul, et je ne l'ai pas dénoué depuis.</p>
<p>Il ne donne ni geste ni humeur : il donne le <em>sentiment d'être là</em>. Une figure ainsi reliée vous regarde quand vous entrez, suit la pièce sans qu'on tire le moindre brin. Elle cesse d'être un objet sans devenir tout à fait autre chose.</p>
<p><strong>Pose.</strong> Au <em>front</em> (le siège de l'intention) et au cœur du réceptacle, d'un seul et même tenant, à voix basse. On ne reprend pas une telle gravure : on la termine, ou on la brûle.</p>
<p><strong>La loi cardinale.</strong> Un fil de présence ne se coupe pas. Il se <em>rend</em>. Le trancher net laisse la figure « ouverte », et ce qui entre alors par la brèche n'est pas toujours ce qu'on y avait mis.</p>
<p><strong>Le risque.</strong> La présence appelle la volonté. Toujours l'accompagner d'un fil d'obéissance (la rune du <em>Serment</em>) et d'une <em>bride</em> (la rune Nauthiz). Sans laisse, on ne sait bientôt plus qui tient les fils.</p>
<p><strong>Combien.</strong> Un. Jamais deux présences dans le même atelier : elles se cherchent dans le noir.</p>
<p class="margin-note">Présence n°I me regarde encore. je ne sais plus si c'est moi qui la tiens.</p>

<div class="group-label">En un coup d'œil <span class="line"></span></div>
<table class="fil-table">
<thead><tr><th>Fil</th><th>Commande</th><th>Persistance</th><th>Tenue max</th><th>Danger</th></tr></thead>
<tbody>
<tr><td>de geste</td><td>un mouvement précis</td><td>tant qu'on tire</td><td>dix (les doigts)</td><td>à-coups, tremblements</td></tr>
<tr><td>d'attitude</td><td>une humeur</td><td>jusqu'au dénouement</td><td>un (deux si sûr)</td><td>débordement, blocage</td></tr>
<tr><td>de présence</td><td>le fait d'être là</td><td>permanente</td><td>un, jamais deux</td><td>volonté propre, brèche</td></tr>
</tbody>
</table>
<p>Règle qui les coiffe tous : <em>jamais plus de fils que la main n'en peut tenir, ni que le réceptacle n'en peut nourrir.</em> Au-delà, ce n'est plus le meneur qui anime la figure : c'est la figure qui éprouve le meneur.</p>`},

  {id:'schema',title:'Schéma général',body:`<p class="lead">Planche d'ensemble : relevé complet du mécanisme.</p>

  {id:'runes_eveil',title:"Runes d'éveil",body:`<p class="lead">Runes pour l'éveil d'une figure autonome, sans fil.</p>
<p>Une marionnette sans fil n'est pas mue du dehors : elle l'est du dedans. Là où l'ancien montage la suspendait à des fils, l'<em>éveil runique</em> grave les fils dans le bois même, et c'est le <em>réservoir de flux magique</em>, au centre du torse, qui tient lieu de meneur.</p>
<p>Chaque rune du Futhark Ancien est un symbole de pouvoir : on la grave, on y insuffle le flux, et elle <em>prolonge, amplifie ou canalise</em>. Assemblées, elles forment un sceau, un <em>bindrune</em>, dont l'effet dépasse celui d'un sort. Voici celles que j'ai retenues.</p>

<div class="group-label">I · Animer le flux <span class="line"></span></div>
<div class="rune-grid">
  <div class="rune-card"><svg viewBox="0 0 40 60" fill="none" stroke="var(--gold-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6V54M13 15L29 9M13 27L29 21"/></svg><div class="rn">Le Flux</div><div class="fu">Fehu</div><p>Puise le flux magique du réservoir et le met en circulation. L'allumage.</p><span class="where">centre du torse</span></div>
  <div class="rune-card"><svg viewBox="0 0 40 60" fill="none" stroke="var(--gold-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6V54M15 6L29 16"/></svg><div class="rn">La Veine</div><div class="fu">Laguz</div><p>Trace les canaux du flux dans le corps, remplace les fils.</p><span class="where">le long des membres</span></div>
  <div class="rune-card"><svg viewBox="0 0 40 60" fill="none" stroke="var(--gold-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M11 54V10L29 22V54"/></svg><div class="rn">La Force</div><div class="fu">Uruz</div><p>Donne aux membres leur force motrice.</p><span class="where">épaules, hanches</span></div>
  <div class="rune-card"><svg viewBox="0 0 40 60" fill="none" stroke="var(--gold-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6V54M13 6L27 12L13 26M13 26L29 50"/></svg><div class="rn">La Marche</div><div class="fu">Raidho</div><p>Ordonne le mouvement, règle la cadence du pas.</p><span class="where">genoux, chevilles</span></div>

<div class="group-label">II · Diriger le lien <span class="line"></span></div>

<div class="group-label">III · Tenir & protéger <span class="line"></span></div>

  <div class="rune-card"><svg viewBox="0 0 40 60" fill="none" stroke="var(--gold-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6V54M6 38L26 24"/></svg><div class="rn">La Bride</div><div class="fu">Nauthiz</div><p>Borne l'autonomie ; le frein. Toujours auprès de l'Esprit.</p><span class="where">contre Mannaz</span></div>
  <div class="rune-card"><svg viewBox="0 0 40 60" fill="none" stroke="var(--gold-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6V54M13 6L27 15L13 25M13 29L27 38L13 48"/></svg><div class="rn">Le Baume</div><div class="fu">Berkano</div><p>Répare le bois, stabilise l'énergie vitale.</p><span class="where">articulations</span></div>

<div class="group-label">Le Sceau d'Éveil <span class="line"></span></div>
<p>Gravées séparément, ces runes ne font que dormir. Réunies en un seul <em>bindrune</em> au creux du réservoir, elles s'éveillent l'une l'autre. Voici l'assemblage que je propose pour une première figure autonome :</p>

<div class="bind-cap"><b>Sceau d'Éveil · première figure</b>Dagaz au centre (l'éveil), porté par la colonne ; Le Flux et Le Souffle sur les flancs, Le Serment en tête, et Le Rempart d'Algiz qui referme l'anneau. Gravé d'un seul tenant, sans lever l'outil.</div>
</div>

<div class="caution">
<div class="ch">⚠ Résonance &amp; péril</div>
<p><b>Valeur numérique.</b> Trop de runes étouffent le réservoir → décharge. Jamais plus de runes que le flux n'en peut nourrir, comme jamais plus de fils que de doigts.</p>
<p><b>Répulsion.</b> L'Arrêt (Isa) repousse Le Flux et L'Ardeur : ne jamais les graver côte à côte, le réservoir se met à bégayer. Isa se place aux extrémités, en frein, loin du cœur.</p>
<p><b>La triade de bride.</b> L'Esprit (Mannaz) ne se grave jamais sans La Bride (Nauthiz) et Le Serment (Tiwaz). Une volonté sans laisse, et la figure cesse d'obéir : c'est ainsi qu'on perd un marionnettiste.</p>
<p><b>L'enceinte.</b> Le Rempart (Algiz) doit entourer le réservoir. Sans lui, une rune mal tracée n'a pas qu'un raté : elle emporte le torse.</p>
<p><b>Et surtout :</b> un corps sans flux, un Golbute, n'accepte aucune rune. Sans réservoir de flux magique, pas d'éveil. La figure doit vivre avant qu'on la grave.</p>
</div>
<p class="margin-note">graver à froid, l'esprit clair, l'intention nette. Une rune ne pardonne pas l'hésitation.</p>`},
  {id:'divination',title:'Divination',body:`<p class="lead">Voir n'est rien. Comprendre est tout.</p>
<p>La divination est l'art d'accéder à ce qui échappe aux sens : les traces du passé, les courants du présent, les possibles de l'avenir. Froide comme une science, profonde comme une prière, elle jette un pont entre le visible et l'invisible. Or mon œuvre, à sa manière, fait de même : elle donne au bois inerte un soupçon de présence. Qui apprend à éveiller des figures gagnerait à apprendre, d'abord, à lire ce qu'il éveille.</p>

<div class="group-label">Pourquoi un marionnettiste s'en soucie <span class="line"></span></div>
<p>Je n'ai pas le loisir de rater cent figures pour en réussir une. La divination ne m'épargnera pas le travail, mais elle peut m'épargner les fautes :</p>
<ul>
<li>choisir la rune juste <em>avant</em> de la graver, plutôt qu'après la décharge ;</li>
<li>pressentir où une figure cédera : un genou, une résonance mal accordée ;</li>
<li>percevoir la nature d'une présence avant qu'elle ne s'installe ;</li>
<li>savoir quand le réceptacle est prêt, et quand il vaut mieux attendre.</li>
</ul>
<p>Elle n'impose aucun destin. Elle révèle des tendances, suggère, oriente. C'est exactement ce qu'il me faut : non des certitudes, mais des avertissements.</p>

<div class="group-label">La Runomancie <span class="line"></span></div>
<p>De toutes les voies, c'est la plus proche de mon travail, car elle parle ma langue : le <em>Futhark Ancien</em>, ces vingt-quatre runes que je grave déjà dans le bois (voir l'onglet <em>Runes d'éveil</em>). Ce que je taille pour animer, je peux aussi le jeter pour interroger.</p>
<p>On tire les runes, et l'on observe quatre choses : le <strong>nom</strong>, la <strong>signification</strong>, la <strong>position</strong> (droite ou renversée) et l'<strong>ordre</strong> du tirage. Une rune renversée n'annonce pas la même chose que droite : pour moi, c'est souvent le signe qu'une gravure résonnera de travers.</p>
<p><strong>Tirages utiles à l'atelier :</strong></p>
<ul>
<li><strong>À trois runes</strong> (passé, présent, futur, ou objectif, obstacle, conseil) : avant d'éveiller une figure, pour savoir ce qui la sert et ce qui la menace.</li>
<li><strong>En croix</strong> : pour lire l'équilibre des forces, les tensions internes et externes d'un montage.</li>
<li><strong>À cinq runes</strong> : pour la vision d'ensemble d'un cheminement, quand je projette une œuvre longue.</li>
</ul>
<p class="margin-note">la rune que je jette le matin, je la grave parfois le soir. les deux gestes se répondent.</p>

<div class="group-label">La Cristallomancie <span class="line"></span></div>
<p>Là où la runomancie répond par des mots, la boule répond par des <em>images</em> : des bribes, des formes, des couleurs, des mouvements symboliques, qu'il faut ensuite interpréter. C'est moins net, mais parfois plus juste pour saisir l'humeur d'une figure, ce que nul mot ne dit.</p>
<p>Une boule moyenne (10 à 12 cm) suffit à l'étude : équilibrée, lisible. Les grandes fatiguent ; les cérémonielles ne sont pas pour l'apprentissage. Avant toute lecture, la <strong>purification</strong> s'impose : exposition à la pleine lune, sel indirect (jamais de contact direct), ou fumigation, la méthode la plus sûre. Une boule souillée ne montre que des visions troubles.</p>
<p>La question, enfin, ne se pose jamais par oui ou non. Elle doit être ouverte et chargée d'une intention claire : non pas « cette figure tiendra-t-elle ? », mais « <em>que dois-je comprendre de cette figure ?</em> ».</p>

<div class="group-label">Les autres voies <span class="line"></span></div>
<p>D'autres arts pourraient servir, à qui sait les écouter :</p>
<ul>
<li><strong>Dactylomancie</strong> : la lecture du mouvement d'anneaux ou de bijoux enchantés. Pour qui passe ses jours à mouvoir des objets, la voie est tentante.</li>
<li><strong>Lampadomancie</strong> et <strong>pyromancie</strong> : lire dans la flamme et sa lumière vacillante, utile près de l'établi, à la veillée.</li>
<li><strong>Bibliomancie</strong> : ouvrir un grimoire au hasard pour qu'une page réponde. J'en use parfois, avec ce carnet même.</li>
</ul>

<div class="group-label">À l'œuvre, pas à pas <span class="line"></span></div>
<p>Avant d'éveiller une figure, voici l'ordre que je me fixe :</p>
<ol>
<li>poser une question ouverte sur la figure, à la boule ou aux runes ;</li>
<li>tirer trois runes pour choisir la rune d'éveil et déceler l'obstacle ;</li>
<li>scruter la boule pour pressentir la nature de la présence à venir ;</li>
<li>ne graver que si les signes concordent. Dans le doute, attendre une lune.</li>
</ol>

<div class="caution">
<div class="ch">Garde-fous</div>
<p>La divination ne donne pas de réponses brutes : elle <b>révèle, suggère et oriente</b>, rien de plus. La clarté d'une vision dépend autant de l'outil que de l'état d'esprit du voyant ; une émotion trouble brouille tout.</p>
<p>Une vision mal interprétée peut conduire à la tragédie, une prophétie mal transmise semer la paranoïa. Les <b>charlatans golbutes</b> ont assez terni cet art : je ne veux pas grossir leurs rangs.</p>
<p>Et qu'on se souvienne d'une chose : un <b>golbute</b> ne possède aucun flux magique. Une figure restée inerte ne se laisse ni lire ni éveiller. Si la boule ne montre rien de l'une de mes figures, ce n'est pas la boule qui est en faute : c'est que la figure ne vit pas encore.</p>
</div>
<p class="margin-note">voir avant de graver. comprendre avant de voir.</p>`},
  {id:'potions',title:'Potions',body:`<p class="lead">Une figure ne boit pas. Mais le bois, le métal et l'ivoire, eux, boivent pour elle.</p>
<p>Voilà longtemps que je tournais autour du problème : les potions sont faites pour des gosiers vivants. Ma figure n'a ni bouche, ni sang, ni ventre. Comment lui donner la vitesse, la force, l'invisibilité que d'autres avalent d'une gorgée ? La réponse était sous mes doigts, dans la matière même de mes montages : l'<em>imprégnation</em>.</p>

<div class="group-label">Le principe de l'imprégnation <span class="line"></span></div>
<p>On ne fait pas avaler une potion à une figure : on l'en <em>imbibe</em>. Le bois la boit comme il boirait de l'eau, le métal la retient comme une charge, l'ivoire la garde scellée. Au moment voulu, une rune de déclenchement (voir l'onglet <em>Runes d'éveil</em>) ouvre la réserve, et le flux du réservoir (voir le <em>Schéma général</em>) pousse l'effet au dehors. La figure agit alors comme si elle avait bu, sans avoir rien bu.</p>
<p>Et c'est ici que je tiens mon plus bel avantage. Toutes ces potions se paient d'un prix : fatigue, faim, vertiges, déshydratation, vieillissement. Or ce prix, c'est le <em>corps</em> qui le règle. Une figure n'a pas de corps. La potion qui épuise un homme en trois usages, ma figure la porte sans jamais faiblir. Les breuvages les plus punissants sont, pour elle, les plus dociles.</p>

<div class="group-label">Les trois supports <span class="line"></span></div>
<table class="fil-table">
<thead><tr><th>Support</th><th>Comportement</th><th>Effets qui lui vont</th></tr></thead>
<tbody>
<tr><td>Bois</td><td>boit lentement, garde longtemps</td><td>effets diffus sur le mouvement de la figure (vitesse, force, légèreté)</td></tr>
<tr><td>Métal doré</td><td>ne boit pas, conduit ; charge vive</td><td>effets projetés au dehors, libérés d'un coup (brume, sommeil, blocage)</td></tr>
<tr><td>Ivoire</td><td>dense, garde une charge pure et stable</td><td>effets fins, rares, à coup unique (invisibilité, vision, réserve de secours)</td></tr>
</tbody>
</table>
<p>Un détail qui m'a coûté trois ratés : seul un métal <em>noble</em> tient une potion. Le cuivre et le fer la corrompent, exactement comme ils gâtent un breuvage qu'on remue d'une louche grossière. Si mes articulations sont en métal doré, ce n'est pas que pour la beauté.</p>

<div class="group-label">Ce qui sert vraiment une figure <span class="line"></span></div>
<table class="fil-table">
<thead><tr><th>Potion</th><th>Effet</th><th>Support</th><th>Ce que la figure en fait</th></tr></thead>
<tbody>
<tr><td>Elixir Velocis</td><td>vitesse et endurance</td><td>bois</td><td>elle se meut deux fois plus vite, sans la fatigue qui suivrait un homme</td></tr>
<tr><td>Liquor Fortis</td><td>force d'un troll enragé</td><td>métal</td><td>des mains qui broient ; le bois ne connaît ni faim ni épuisement</td></tr>
<tr><td>Liquor Aurae</td><td>légèreté, bonds prolongés</td><td>bois</td><td>elle saute haut et retombe sans le moindre choc</td></tr>
<tr><td>Obturatum</td><td>immobilise dans un rayon de 5 m</td><td>métal</td><td>l'arme silencieuse rêvée : elle fige l'adversaire sans une goutte de sang</td></tr>
<tr><td>Nebula Caeca</td><td>brume aveuglante</td><td>métal</td><td>elle crève la salle d'une brume blanche pour couvrir une retraite</td></tr>
<tr><td>Suspirium Medianae Noctis</td><td>sommeil profond</td><td>métal</td><td>elle endort une cible à distance, d'un souffle couleur lavande</td></tr>
<tr><td>Nebula Mentis</td><td>confusion mentale</td><td>métal</td><td>elle sème le trouble chez qui l'attaque</td></tr>
<tr><td>Elixir Nyr'hal</td><td>invisibilité</td><td>ivoire</td><td>elle disparaît pour agir dans l'ombre</td></tr>
<tr><td>Elixir Noctis</td><td>vision dans le noir total</td><td>ivoire</td><td>elle voit et oeuvre sans lumière, au fond des cryptes</td></tr>
<tr><td>Panacea Vitalis</td><td>revitalise le flux</td><td>bois (coeur)</td><td>la seule potion de soin utile : elle regorge le réservoir et raffermit un bois fendu</td></tr>
</tbody>
</table>
<p class="margin-note">une figure muette, rapide, invisible, qui fige sans tuer. ce n'était plus une poupée d'étude. c'était autre chose.</p>

<div class="group-label">Ce qui ne sert à rien <span class="line"></span></div>
<p>Beaucoup de potions glissent sur une figure sans prise, et il faut le savoir avant de gâcher un flacon :</p>
<ul>
<li><strong>Les philtres</strong> (Aqua Cupidinis, Elixir Veritae, Oblivium, Aura Reminiscentiae) agissent sur un esprit, des émotions, une mémoire. Une figure n'en a pas : ils restent inertes dans le bois.</li>
<li><strong>Les transformations</strong> (Feline Dulcedo, Lepus Dulcedo, Gallus Elixis) exigent un corps vivant et sa trace de chair. Le bois ne se métamorphose pas en chat.</li>
<li><strong>Le soin du corps et le temps</strong> (Panacea Capilus, Damnum Capillus, Rejuvena, Senectus Draught) n'ont aucun effet sans chair à guérir ou à vieillir. Rejuvena, déjà sans effet sur l'immortel et le mort-vivant, n'en a pas davantage sur ce qui n'a jamais vécu.</li>
</ul>

<div class="caution">
<div class="ch">Garde-fous</div>
<p>Seule une figure <b>éveillée</b>, traversée de flux, peut canaliser une imprégnation. Un golbute, ou un bois resté inerte, ne libère rien : la potion y dort sans fin.</p>
<p>Ne pas surcharger. Trop d'imprégnations se disputent comme trop de fils : le bois se fend, le métal se ternit, l'effet tourne. Un surdosage qui donnerait à un homme une pilosité folle déforme, chez une figure, le support lui-même.</p>
<p>Toujours <b>purifier</b> le support avant de l'imbiber, et sceller la charge d'une rune de retenue (Nauthiz) pour qu'elle ne suinte pas avant l'heure. L'antidote de presque tout cela reste, comme toujours, la Panacea Mirabilis.</p>
</div>
<p class="margin-note">le bois boit, le métal garde, l'ivoire scelle. à moi de ne verser que ce que la figure peut porter.</p>`},
  {id:'kitsune',title:'Kitsune',body:`<p class="lead">On les dit gardiens du seuil : ni tout à fait vivants, ni tout à fait morts.</p>

<p>Disons-le franchement, avant toute belle phrase : <strong>je ne sais rien des kitsune</strong>. Rien de sûr, rien de prouvé, rien que je tienne de ma propre main. Tout ce que cette page contient n'est que rumeur entendue, image entrevue, intuition. Je l'écris quand même, car c'est en écrivant que je verrai enfin ce qui me manque.</p>
<div class="group-label">Entre la vie et la mort <span class="line"></span></div>
<p>Le kitsune n'appartient à aucun des deux mondes, et c'est pour cela qu'il les connaît tous les deux. On le rencontre là où la frontière s'amincit : aux veillées, sur les seuils, auprès de ceux qui s'en vont. La rumeur lui prête une flamme pâle, le feu-follet, dont il se sert pour éclairer le chemin des âmes égarées.</p>
<p>Ce qui me retient n'est pas la légende, mais ce qu'elle recouvre. Un kitsune semble savoir ce que nul mage de ma connaissance ne sait faire : il sait <em>guider une âme</em>. La conduire, l'accompagner, la déposer où il faut.</p>
<div class="group-label">Guider une âme <span class="line"></span></div>
<p>J'ai appris à donner à mes figures une présence (voir l'onglet <em>Sortilèges</em>). Mais une présence n'est qu'une apparence d'âme : un reflet tenu par des fils, qui s'éteint dès qu'on les lâche. Ce que je n'ai jamais su faire, c'est y loger une âme véritable.</p>
<p>Et si un kitsune le pouvait ? Si ce qu'il accomplit pour mener une âme vers l'au-delà, il savait l'accomplir en sens inverse : la mener non vers la mort, mais vers un <em>corps</em> ? Un corps de bois, de métal et d'ivoire, préparé, runé, son réservoir prêt à l'accueillir (voir le <em>Schéma général</em>). Non plus une marionnette : une demeure.</p>
<p>Je n'écris pas que c'est possible. J'écris que, pour la première fois, je ne parviens plus à écrire que c'est impossible.</p>
<p class="margin-note">une figure inerte, un golbute sans flux, ne recevrait rien. il faut qu'elle vive un peu pour pouvoir, peut-être, vivre tout à fait.</p>
<div class="group-label">L'objectif <span class="line"></span></div>
<p>Je ne sais presque rien d'eux, et c'est par là que tout commence. Mon but, aujourd'hui, tient en peu de mots : <strong>les approcher, les observer, en apprendre davantage</strong>. Comprendre comment ils tiennent une âme sans la briser, par quel art ils la mènent, et si cet art se transmet, s'apprend, se mérite.</p>
<p>Une règle, que je m'inscris en lettres plus hautes que les autres : apprendre tout cela <strong>sans mourir</strong>. Car qui marche trop près de ceux qui passent le seuil finit, un jour, par le passer à son tour. Je veux leur secret, pas leur compagnie.</p>
<div class="group-label">Ce que je sais déjà <span class="line"></span></div>
<p>Presque rien. Et c'est précisément ce vide qu'il me faut combler, ligne après ligne. Tant que ces pages restent blanches, je ne sais pas ; le jour où elles seront pleines, je saurai. Alors j'écris, faute de mieux, et parce qu'écrire est déjà commencer à comprendre. Chaque rumeur recueillie, chaque détail noté est une marche de plus vers eux.</p>
<p class="margin-note">(tout reste à écrire ici, de ma main, à mesure. pour l'heure, la page attend, et c'est bien là le problème.)</p>
<div class="caution">
<div class="ch">Prudence</div>
<p>Un kitsune n'est pas un grimoire que l'on ouvre : c'est une volonté, plus ancienne et plus rusée que la mienne. On ne l'interroge pas sans offrir, on ne le suit pas sans risquer de ne plus revenir.</p>
<p>Avancer à pas comptés. Tout consigner. Ne jamais promettre ce que je ne peux tenir. Et au moindre froid dans la nuque, refermer le carnet et rentrer.</p>
</div>
<p class="margin-note">savoir, encore. mourir, pas encore.</p>`}

/* ---------- Pantin articulé (manipulable à la souris) ---------- */
let pantinRAF=null;
function mountPantin(){
  if(pantinRAF){cancelAnimationFrame(pantinRAF);pantinRAF=null;}
  const stage=pageBody.querySelector('#pantinStage');
  if(!stage)return;
  stage.innerHTML='';
  const NS='http://www.w3.org/2000/svg', VBW=300, VBH=360, cx=VBW/2;
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 '+VBW+' '+VBH);
  stage.appendChild(svg);
  const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const P=(x,y)=>({x:x,y:y,px:x,py:y});
  const bar={x:cx,y:46,tx:cx,ty:46}, halfBar=46;
  const pts={
    H:P(cx,98), S:P(cx,140), Hip:P(cx,205),
    LE:P(cx-30,150), LH:P(cx-52,168), RE:P(cx+30,150), RH:P(cx+52,168),
    LK:P(cx-18,262), LF:P(cx-20,322), RK:P(cx+18,262), RF:P(cx+20,322)
  };
  const dist=(a,b)=>Math.hypot(pts[a].x-pts[b].x,pts[a].y-pts[b].y);
  const bones=[['H','S'],['S','Hip'],['S','LE'],['LE','LH'],['S','RE'],['RE','RH'],['Hip','LK'],['LK','LF'],['Hip','RK'],['RK','RF']].map(b=>[b[0],b[1],dist(b[0],b[1])]);
  const strings=[{dx:0,p:'H'},{dx:-halfBar,p:'LH'},{dx:halfBar,p:'RH'}];
  strings.forEach(s=>{s.len=Math.hypot((bar.x+s.dx)-pts[s.p].x,bar.y-pts[s.p].y);});
  const grav=0.4, fric=0.98, iter=14;
  function step(){
    bar.x+=(bar.tx-bar.x)*0.18; bar.y+=(bar.ty-bar.y)*0.18;
    for(const k in pts){const p=pts[k];const vx=(p.x-p.px)*fric,vy=(p.y-p.py)*fric;p.px=p.x;p.py=p.y;p.x+=vx;p.y+=vy+grav;}
    for(let i=0;i<iter;i++){
      for(const s of strings){const ax=bar.x+s.dx,ay=bar.y,p=pts[s.p];let dx=p.x-ax,dy=p.y-ay,dl=Math.hypot(dx,dy)||0.0001,diff=(dl-s.len)/dl;p.x-=dx*diff;p.y-=dy*diff;}
      for(const b of bones){const a=pts[b[0]],c=pts[b[1]];let dx=c.x-a.x,dy=c.y-a.y,dl=Math.hypot(dx,dy)||0.0001,diff=(dl-b[2])/dl*0.5;dx*=diff;dy*=diff;a.x+=dx;a.y+=dy;c.x-=dx;c.y-=dy;}
    }
  }
  const sEls=strings.map(()=>el('line',{stroke:'#ecd595','stroke-width':1,'stroke-dasharray':'2 3',opacity:.65}));
  sEls.forEach(e=>svg.appendChild(e));
  const barEl=el('line',{stroke:'#c9a24b','stroke-width':4,'stroke-linecap':'round'});
  const knob1=el('circle',{r:3.2,fill:'#c9a24b'}), knob2=el('circle',{r:3.2,fill:'#c9a24b'});
  svg.appendChild(barEl);svg.appendChild(knob1);svg.appendChild(knob2);
  const boneEls=bones.map(()=>el('line',{stroke:'#ecd595','stroke-width':3,'stroke-linecap':'round',opacity:.92}));
  boneEls.forEach(e=>svg.appendChild(e));
  const jn=['S','Hip','LE','RE','LK','RK','LH','RH','LF','RF'], jEls={};
  jn.forEach(n=>{const c=el('circle',{r:3.2,fill:'#c9a24b'});jEls[n]=c;svg.appendChild(c);});
  const headEl=el('circle',{r:13,fill:'#1c2a1f',stroke:'#ecd595','stroke-width':2});
  const coreEl=el('circle',{r:3.6,fill:'#4fae7e'});
  svg.appendChild(headEl);svg.appendChild(coreEl);
  function render(){
    strings.forEach((s,i)=>{const ax=bar.x+s.dx;sEls[i].setAttribute('x1',ax);sEls[i].setAttribute('y1',bar.y);sEls[i].setAttribute('x2',pts[s.p].x);sEls[i].setAttribute('y2',pts[s.p].y);});
    barEl.setAttribute('x1',bar.x-halfBar);barEl.setAttribute('y1',bar.y);barEl.setAttribute('x2',bar.x+halfBar);barEl.setAttribute('y2',bar.y);
    knob1.setAttribute('cx',bar.x-halfBar);knob1.setAttribute('cy',bar.y);knob2.setAttribute('cx',bar.x+halfBar);knob2.setAttribute('cy',bar.y);
    bones.forEach((b,i)=>{const a=pts[b[0]],c=pts[b[1]],e=boneEls[i];e.setAttribute('x1',a.x);e.setAttribute('y1',a.y);e.setAttribute('x2',c.x);e.setAttribute('y2',c.y);});
    jn.forEach(n=>{jEls[n].setAttribute('cx',pts[n].x);jEls[n].setAttribute('cy',pts[n].y);});
    headEl.setAttribute('cx',pts.H.x);headEl.setAttribute('cy',pts.H.y);
    coreEl.setAttribute('cx',pts.S.x);coreEl.setAttribute('cy',pts.S.y);
  }
  function toSvg(e){const r=svg.getBoundingClientRect();return {x:(e.clientX-r.left)/r.width*VBW,y:(e.clientY-r.top)/r.height*VBH};}
  let hovering=false;
  svg.addEventListener('pointermove',e=>{hovering=true;const q=toSvg(e);bar.tx=Math.max(40,Math.min(VBW-40,q.x));bar.ty=Math.max(28,Math.min(150,q.y));});
  svg.addEventListener('pointerdown',e=>{hovering=true;const q=toSvg(e);bar.tx=Math.max(40,Math.min(VBW-40,q.x));bar.ty=Math.max(28,Math.min(150,q.y));});
  svg.addEventListener('pointerleave',()=>{hovering=false;});
  function loop(){
    if(!document.body.contains(stage)){pantinRAF=null;return;}
    if(!hovering){bar.tx=cx+Math.sin(Date.now()/750)*42;bar.ty=46;}
    step();render();
    pantinRAF=requestAnimationFrame(loop);
  }
  loop();
}

function selectTab(id){
  saveCurrent();
  activeId=id;
  renderTabs();renderPage();
  document.querySelector('.content').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ---------- Sauvegarde du contenu courant ---------- */
function saveCurrent(){
  const t=tabs.find(x=>x.id===activeId);
  if(!t)return;
  t.title=pageTitle.textContent.trim()||'Sans titre';
  const clone=pageBody.cloneNode(true);
  const img=clone.querySelector('#schemaImg');
  if(img)img.removeAttribute('src');
  const nimg=clone.querySelector('#neuroImg');
  if(nimg)nimg.removeAttribute('src');
  const ps=clone.querySelector('#pantinStage');
  if(ps)ps.innerHTML='';
  const ef=clone.querySelector('.ember-field');
  if(ef)ef.remove();
  t.body=clone.innerHTML;
  persist();
}

/* ---------- Ajout / suppression ---------- */
function addTab(){
  saveCurrent();
  const id='onglet_'+Date.now();
  tabs.push({id,title:'Nouvel onglet',body:'<p>À toi d\'écrire…</p>'});
  activeId=id;
  renderTabs();renderPage();persist();
  pageTitle.focus();
  document.execCommand('selectAll',false,null);
}
function deleteTab(id){
  if(tabs.length<=1){alert('Il faut garder au moins un onglet.');return;}
  const t=tabs.find(x=>x.id===id);
  if(!confirm('Supprimer l\'onglet « '+t.title+' » ?'))return;
  tabs=tabs.filter(x=>x.id!==id);
  if(activeId===id)activeId=tabs[0].id;
  renderTabs();renderPage();persist();
}

/* ---------- Mode édition ---------- */
function setEditing(on){
  editing=on;
  document.body.classList.toggle('editing',on);
  pageTitle.contentEditable=on;
  pageBody.contentEditable=on;
  editToggle.textContent=on?'Terminer':'Éditer';
  editToggle.classList.toggle('active',on);
  resetBtn.style.display=on?'inline-block':'none';
  if(!on)saveCurrent();
}
editToggle.addEventListener('click',()=>setEditing(!editing));

/* ---------- Sauvegarde différée pendant la frappe ---------- */
let timer;
function deferSave(){clearTimeout(timer);timer=setTimeout(saveCurrent,400);}
pageBody.addEventListener('input',deferSave);
pageTitle.addEventListener('input',()=>{
  const t=tabs.find(x=>x.id===activeId);
  if(t){t.title=pageTitle.textContent.trim()||'Sans titre';
    const lbl=[...tabList.querySelectorAll('.tab-item')][tabs.indexOf(t)]?.querySelector('.label');
    if(lbl)lbl.textContent=t.title;}
  deferSave();
});

/* ---------- Barre d'outils ---------- */
toolbar.addEventListener('click',e=>{
  const b=e.target.closest('.tool');if(!b)return;
  const cmd=b.dataset.cmd;
  pageBody.focus();
  if(cmd==='bold')document.execCommand('bold');
  else if(cmd==='italic')document.execCommand('italic');
  else if(cmd==='h3')document.execCommand('formatBlock',false,'h3');
  else if(cmd==='list')document.execCommand('insertUnorderedList');
  else if(cmd==='note'){
    const sel=window.getSelection().toString()||'note manuscrite…';
    document.execCommand('insertHTML',false,'<p class="margin-note">'+sel+'</p>');
  }
  deferSave();
});

addTabBtn.addEventListener('click',addTab);
resetBtn.addEventListener('click',()=>{
  if(!confirm('Restaurer les onglets d\'origine ? Tes modifications seront perdues.'))return;
  tabs=JSON.parse(JSON.stringify(DEFAULTS));activeId=tabs[0].id;
  renderTabs();renderPage();persist();
});

/* ---------- Logo (photo en médaillon) ---------- */
(function setLogo(){
  if(typeof LOGO_SRC==='undefined')return;
  ['logoVeil','logoBrand'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){el.setAttribute('href',LOGO_SRC);el.setAttribute('xlink:href',LOGO_SRC);}
  });
})();

/* ---------- Voile ---------- */
const veil=document.getElementById('veil');
function lift(){veil.classList.add('lifted');if(typeof startMusic==='function')startMusic();}
veil.addEventListener('click',lift);
veil.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')lift()});

/* ---------- Ambiance ---------- */
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!reduce){
  const dust=document.getElementById('dust');
  for(let i=0;i<24;i++){
    const m=document.createElement('div');m.className='mote';
    const s=Math.random()*2.4+1;m.style.width=m.style.height=s+'px';
    m.style.left=Math.random()*100+'%';m.style.bottom='-10px';
    m.style.animationDuration=(Math.random()*22+18)+'s';
    m.style.animationDelay=(Math.random()*20)+'s';dust.appendChild(m);
  }
}

/* ---------- Lightbox (agrandissement du schéma) ---------- */
const lightbox=document.getElementById('lightbox');
const lbImg=document.getElementById('lbImg');
const lbClose=document.getElementById('lbClose');
function openLightbox(src){lbImg.src=src;lightbox.classList.add('open');}
function closeLightbox(){lightbox.classList.remove('open');}
lightbox.addEventListener('click',e=>{if(e.target!==lbImg)closeLightbox();});
lbClose.addEventListener('click',closeLightbox);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

/* ---------- Agrandissement d'une rune au clic ---------- */
const runeModal=document.getElementById('runeModal');
const rmGlyph=document.getElementById('rmGlyph');
const rmName=document.getElementById('rmName');
const rmFu=document.getElementById('rmFu');
const rmEff=document.getElementById('rmEff');
const rmWhere=document.getElementById('rmWhere');
const rmClose=document.getElementById('rmClose');
function openRuneModal(card){
  const svg=card.querySelector('svg');
  rmGlyph.innerHTML=svg?svg.outerHTML:'';
  rmName.textContent=card.querySelector('.rn')?.textContent||'';
  rmFu.textContent=card.querySelector('.fu')?.textContent||'';
  rmEff.textContent=card.querySelector('p')?.textContent||'';
  const w=card.querySelector('.where')?.textContent||'';
  rmWhere.textContent=w?('Où la graver : '+w):'';
  rmWhere.style.display=w?'block':'none';
  runeModal.classList.add('open');
}
function closeRuneModal(){runeModal.classList.remove('open');}
/* délégation : fonctionne à chaque rendu de page, sauf en mode édition */
pageBody.addEventListener('click',e=>{
  if(document.body.classList.contains('editing'))return;
  const card=e.target.closest('.rune-card');
  if(card)openRuneModal(card);
});
runeModal.addEventListener('click',e=>{if(!e.target.closest('.rune-modal-card'))closeRuneModal();});
rmClose.addEventListener('click',closeRuneModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeRuneModal();});

/* ---------- Lecteur de musique ---------- */
const playBtn=document.getElementById('play'),iconPlay=document.getElementById('icon-play'),iconPause=document.getElementById('icon-pause');
const fileInput=document.getElementById('file'),vol=document.getElementById('vol'),trackEl=document.getElementById('track');
const audio=new Audio();audio.loop=true;audio.preload='auto';
audio.src='azen-theme.mp3';
audio.volume=0.5;vol.value=0.5;
trackEl.textContent='St Trina';
playBtn.disabled=false;
let musicStarted=false;
function startMusic(){
  if(musicStarted)return;
  audio.volume=parseFloat(vol.value)||0.5;
  audio.play().then(()=>{musicStarted=true;setPlaying();}).catch(()=>{});
}
seal.addEventListener('click',()=>panel.classList.toggle('open'));
fileInput.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  audio.src=URL.createObjectURL(f);trackEl.textContent=f.name.replace(/\.[^.]+$/,'');
  musicStarted=true;playBtn.disabled=false;audio.play().then(setPlaying).catch(()=>{});
});
playBtn.addEventListener('click',()=>{if(!audio.src)return;
  if(audio.paused){musicStarted=true;audio.play().then(setPlaying).catch(()=>{});}else{audio.pause();setPaused();}});
function setPlaying(){iconPlay.style.display='none';iconPause.style.display='block';seal.classList.add('playing');}
function setPaused(){iconPlay.style.display='block';iconPause.style.display='none';seal.classList.remove('playing');}
audio.addEventListener('ended',setPaused);
vol.addEventListener('input',()=>audio.volume=parseFloat(vol.value));

/* ---------- Démarrage ---------- */
renderTabs();renderPage();
</script>
</body>
</html>
